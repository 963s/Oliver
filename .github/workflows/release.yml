name: Build and Release (manual)

# Releases are built and published locally via `npm run electron:release`
# from the developer's Mac (needs better-sqlite3 native rebuild for the
# target arch). The default GITHUB_TOKEN does not have permission to
# publish to a private repo's Releases anyway, so the auto-on-tag-push
# trigger was always failing. Kept the job here for manual dispatch
# in case CI signing ever comes online.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build and Release Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:release
